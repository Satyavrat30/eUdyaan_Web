<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Us</title>
  <link rel="stylesheet" href="contact.css">
</head>
<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="logo">eUdyaan</div>

  <nav>
    <a href="../index.html">Home</a>
    <a href="../resources/resources.html">Resources</a>
    <a href="../appointment/appointment.html">Appointment</a>
    <a href="../community/community.html">Community</a>
    <a class="active">About us</a>
    <a href="#">Contact us</a>
  </nav>

  <div class="auth">
    <button class="login">login</button>
    <span class="signup">Signup</span>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <h1>We'd Love to Hear From You</h1>
  <p>
    Have questions, suggestions, or just want to say hello?
    We're here to help and always happy to connect.
  </p>
</section>

<!-- FORM CARD -->
<section class="form-wrapper">
  <form class="contact-form">

    <div class="row">
      <div class="field">
        <label>First Name</label>
        <input type="text" placeholder="Your first name">
      </div>

      <div class="field">
        <label>Last Name</label>
        <input type="text" placeholder="Your last name">
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label>Email</label>
        <input type="email" placeholder="email@domain.com">
      </div>

      <div class="field">
        <label>Phone</label>
        <input type="text" placeholder="+21 228xxx">
      </div>
    </div>

    <div class="field full">
      <label>Email</label>
      <textarea placeholder="Your message"></textarea>
    </div>

    <button type="submit" class="submit-btn">Send message</button>

  </form>
</section>

</body>
</html>
