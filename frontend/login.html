<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login – eUdyaan</title>
<link rel="stylesheet" href="auth.css">
</head>
<body>

<div class="auth-container">
  <div class="auth-card">
    <a class="back-btn" href="index.html">← Back to Home</a>
    <h2 style="margin-bottom:18px;color:#3a5a40;">Welcome Back</h2>

    <div class="field">
      <label>Email</label>
      <input id="loginEmail" type="email" placeholder="email@domain.com">
    </div>

    <div class="field">
      <label>Password</label>
      <div class="password-box">
        <input id="loginPassword" type="password" placeholder="Enter your password">
        <span class="eye" onclick="togglePass('loginPassword',this)">Show</span>
      </div>
    </div>

    <button id="loginBtn" class="btn">Login</button>
    <p id="authMessage" class="forgot"></p>

    <div style="margin-top:14px;text-align:center;font-size:14px;color:#64748b;">
      <a href="forgot-password.html" style="color:#5f6f52;">Forgot password?</a>
      &nbsp;•&nbsp;
      <a href="signup.html" style="color:#5f6f52;">New here? Register</a>
    </div>
  </div>
</div>

<script>
function togglePass(id, el) {
  const inp = document.getElementById(id);
  if (inp.type === "password") { inp.type = "text"; el.textContent = "Hide"; }
  else { inp.type = "password"; el.textContent = "Show"; }
}
</script>
<script src="auth.js"></script>
</body>
</html>
