<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup</title>
<link rel="stylesheet" href="auth.css">
</head>
<body>

<div class="auth-container">
  <div class="auth-card">
    <a class="back-btn" href="index.html">Back to Home</a>

    <div class="row">
      <div class="field">
        <label>First Name</label>
        <input id="firstName" type="text" placeholder="Your first name">
      </div>

      <div class="field">
        <label>Last Name</label>
        <input id="lastName" type="text" placeholder="Your last name">
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label>Email</label>
        <input id="signupEmail" type="email" placeholder="email@domain.com">
      </div>

      <div class="field">
        <label>Phone</label>
        <input id="phone" type="text" placeholder="+21 228xxxx">
      </div>
    </div>

    <div class="field">
      <label>Password</label>
      <div class="password-box">
        <input id="signupPassword" type="password" placeholder=".....">
        <span class="eye">Show</span>
      </div>
    </div>

    <button id="signupBtn" class="btn">Sign Up</button>
    <p id="authMessage" class="forgot"></p>
  </div>
</div>

<script src="auth.js"></script>
</body>
</html>
