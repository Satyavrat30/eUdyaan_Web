<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password – eUdyaan</title>
<link rel="stylesheet" href="auth.css">
<style>
  .strength-wrap { margin-top: 6px; }
  .strength-track { height: 5px; background: #e2e8f0; border-radius: 4px; overflow: hidden; }
  #passwordStrengthBar { height: 100%; width: 0; border-radius: 4px; transition: width 0.3s, background 0.3s; }
  #passwordStrengthLabel { font-size: 12px; margin-top: 3px; color: #94a3b8; }
</style>
</head>
<body>
<div class="auth-container">
  <div class="auth-card">
    <h2 style="margin-bottom:18px;color:#3a5a40;">Set New Password</h2>
    <div class="field">
      <label>New Password</label>
      <div class="password-box">
        <input id="newPassword" type="password" placeholder="Min 8 chars, mixed + symbol">
        <span class="eye" onclick="togglePass('newPassword',this)">Show</span>
      </div>
      <div class="strength-wrap">
        <div class="strength-track"><div id="passwordStrengthBar"></div></div>
        <div id="passwordStrengthLabel"></div>
      </div>
    </div>
    <div class="field">
      <label>Confirm New Password</label>
      <div class="password-box">
        <input id="confirmNewPassword" type="password" placeholder="Re-enter new password">
        <span class="eye" onclick="togglePass('confirmNewPassword',this)">Show</span>
      </div>
    </div>
    <button id="resetPasswordBtn" class="btn">Reset Password</button>
    <p id="authMessage" class="forgot"></p>
  </div>
</div>
<script>
function togglePass(id, el) {
  const inp = document.getElementById(id);
  if (inp.type === "password") { inp.type = "text"; el.textContent = "Hide"; }
  else { inp.type = "password"; el.textContent = "Show"; }
}
</script>
<script src="auth.js"></script>
</body>
</html>
