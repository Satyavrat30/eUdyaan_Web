<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password – eUdyaan</title>
<link rel="stylesheet" href="auth.css">
</head>
<body>
<div class="auth-container">
  <div class="auth-card">
    <a class="back-btn" href="login.html">← Back to Login</a>
    <h2 style="margin-bottom:8px;color:#3a5a40;">Forgot Password?</h2>
    <p style="font-size:14px;color:#64748b;margin-bottom:18px;">Enter your registered email and we'll send you a reset link.</p>
    <div class="field">
      <label>Email</label>
      <input id="forgotEmail" type="email" placeholder="email@domain.com">
    </div>
    <button id="forgotPasswordBtn" class="btn">Send Reset Link</button>
    <p id="authMessage" class="forgot"></p>
  </div>
</div>
<script src="auth.js"></script>
</body>
</html>
